name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between
# the run in-progress and latest queued.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          YOUTUBE_VIDEO_TOP_LEFT_ID: ${{ vars.YOUTUBE_VIDEO_TOP_LEFT_ID }}
          YOUTUBE_VIDEO_TOP_RIGHT_ID: ${{ vars.YOUTUBE_VIDEO_TOP_RIGHT_ID }}
          YOUTUBE_VIDEO_BOTTOM_LEFT_ID: ${{ vars.YOUTUBE_VIDEO_BOTTOM_LEFT_ID }}
          YOUTUBE_VIDEO_BOTTOM_RIGHT_ID: ${{ vars.YOUTUBE_VIDEO_BOTTOM_RIGHT_ID }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
