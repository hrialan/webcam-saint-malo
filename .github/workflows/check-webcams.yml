name: Check Webcams

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-webcams:
    name: Verify Webcams Status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check webcams availability
        id: check
        continue-on-error: true
        run: python3 check_webcams.py

      - name: Create issue if webcams are down
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Webcam Status Alert - Check Required',
              body: `One or more webcams are not accessible or appear to be offline.\n\nPlease check the workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nAction needed:\n- [ ] Verify YouTube video IDs are still correct\n- [ ] Check if videos are still live\n- [ ] Update GitHub repository variables if needed`,
              labels: ['webcam-alert']
            });
